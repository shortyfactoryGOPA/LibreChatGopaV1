<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="GOPA AI">
  <title>GOPA AI – Half Crest (between Tile and Crest)</title>
  <!--
    Mid-strength variant. Wave occupies the lower ~45% with the same
    right-aligned slice logic as Icon 3, but in a shorter container.
    Result: visible yellow crest, more whitespace overall, gentler than Icon 3.
  -->
  <defs>
    <linearGradient id="g-half-crest" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B5B5B5"/>
      <stop offset="45%" stop-color="#C9B88A"/>
      <stop offset="100%" stop-color="#FCC200"/>
    </linearGradient>
  </defs>

  <rect width="240" height="240" fill="#ffffff"/>

  <svg x="0" y="132" width="240" height="108" viewBox="0 0 1920 258.72" preserveAspectRatio="xMaxYMax slice">
    <path fill="url(#g-half-crest)" d="M1919.5,9.23c-225.46,8.94-454.5,83.04-670.31,142.72-320.47,90.8-661.34,114-990.17,58.03C177.53,194.25,81.12,167.11,0,148.52v110.2h1919.52l-.02-249.49Z"/>
  </svg>
</svg>
