# Configuration version (required)
version: 1.3.8

# Cache settings: Set to true to enable caching
cache: true

# Custom interface configuration
interface:
  customWelcome: 'Welcome to GOPA AI. How can I help today?'
  fileSearch: true
  # Privacy policy settings
  privacyPolicy:
    externalUrl: 'https://librechat.ai/privacy-policy'
    openNewTab: true

  termsOfService:
    openNewTab: true
    modalAcceptance: true
    modalTitle: 'Terms of Service for GOPA AI Chatbot'
    modalContent: |
      # Terms and Conditions for GOPA AI Chatbot

      *Effective Date: May 7, 2025*

      Welcome to the GOPA AI Chatbot, an internal AI-powered assistant provided by GOPA Consulting Group. By accessing or using this platform, you agree to the following terms.

      ## 1. Access and Authorization

      Access to this platform is strictly reserved for authorized users. Your credentials are personal and must not be shared. Any unauthorized use must be reported immediately to your system administrator.

      ## 2. Acceptable Use

      This platform is provided for professional purposes only. You agree not to use it to process confidential client data without prior authorization, generate misleading, offensive, or discriminatory content, attempt to circumvent security controls or extract system information, or violate applicable laws or GOPA's internal policies.

      ## 3. AI-Generated Content

      Responses generated by this assistant are produced by an AI model and may contain errors or inaccuracies. All outputs must be reviewed and validated before use in any official document, client deliverable, or decision-making process. GOPA assumes no liability for decisions made solely based on AI-generated content.

      ## 4. Data and Confidentiality

      Do not enter personally identifiable information (PII), sensitive personal data, or confidential client information unless explicitly authorized. Conversation data may be stored and used to improve service quality, in accordance with GOPA's data protection policy.

      ## 5. Intellectual Property

      Content generated through this platform in the course of your professional duties remains the property of GOPA Consulting Group and is subject to applicable confidentiality obligations.

      ## 6. Changes to These Terms

      GOPA reserves the right to update these terms at any time. Continued use of the platform constitutes acceptance of the revised terms.

      ## 7. Contact

      For questions or to report misuse, contact: servicedesk@gopa.eu

  modelSelect: true
  parameters: true
  presets: true
  prompts:
    use: true
    create: true
    share: false
    public: false
  bookmarks: true
  multiConvo: true
  agents:
    use: true
    create: true
    share: false
    public: false
  peoplePicker:
    users: true
    groups: true
    roles: true
  marketplace:
    use: false
  mcpServers:
    use: false
    create: false
    share: false
    public: false
  fileCitations: true
registration:
  socialLogins: ['github', 'google', 'discord', 'openid', 'facebook', 'apple', 'saml']
actions:
  allowedDomains:
    - 'swapi.dev'
    - 'librechat.ai'
    - 'google.com'
endpoints:
  azureOpenAI:
    assistants: true
    groups:
      - group: "azure-prod"
        apiKey: "${AZURE_OPENAI_API_KEY}"
        instanceName: "${AZURE_OPENAI_INSTANCE_NAME}"       # ex: mon-openai-prod
        version: "2025-01-01-preview"                   # version API Azure
        assistants: true
        models:
          gpt-5.2:
            deploymentName: "gpt-5.2"

          gpt-5.4:
            deploymentName: "gpt-5.4"

          gpt-5.5:
            deploymentName: "gpt-5.5"

  azureAssistants:
    disableBuilder: true
    pollIntervalMs: 3000
    timeoutMs: 180000
    capabilities: ["code_interpreter", "retrieval", "actions", "tools", "image_vision"]
modelSpecs:
  enforce: true
  list:
    - name: "azure-gpt-5-2"
      label: "GPT-5.2"
      description: "Web Search + Native Code Interpreter"
      group: "Azure OpenAI"
      groupIcon: "azureOpenAI"
      webSearch: true
      executeCode: true
      preset:
        endpoint: "azureOpenAI"
        model: "gpt-5.2"
        useResponsesApi: true
        web_search: true
        code_interpreter: true
        temperature: 0.3

    - name: "azure-gpt-5-4"
      label: "GPT-5.4"
      description: "Web Search + Native Code Interpreter"
      group: "Azure OpenAI"
      webSearch: true
      executeCode: true
      preset:
        endpoint: "azureOpenAI"
        model: "gpt-5.4"
        useResponsesApi: true
        web_search: true
        code_interpreter: true
        temperature: 0.3

    - name: "azure-gpt-5-5"
      label: "GPT-5.5"
      description: "Web Search + Native Code Interpreter"
      default: true
      group: "Azure OpenAI"
      webSearch: true
      executeCode: true
      preset:
        endpoint: "azureOpenAI"
        model: "gpt-5.5"
        useResponsesApi: true
        web_search: true
        code_interpreter: true
        reasoning_summary: "auto"

fileConfig:
  serverFileSizeLimit: 25  # Aligned with nginx client_max_body_size

# Web Search Configuration (optional)
webSearch:
  searxngInstanceUrl: '${SEARXNG_INSTANCE_URL}'

# Memory configuration for user memories
memory:
  disabled: false
  personalize: true
  validKeys:
    - "user_preferences"
    - "conversation_context"
    - "learned_facts"
    - "personal_information"
  tokenLimit: 3000
  charLimit: 10000
  messageWindowSize: 5
  agent:
    provider: "azureOpenAI"
    model: "gpt-5.4"
    model_parameters:
      temperature: 0.2
      useResponsesApi: true
