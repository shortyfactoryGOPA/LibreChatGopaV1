# Definition of custom endpoints
endpoints:
  azureOpenAI:
    assistants: true
    groups:
      - group: "azure-prod"
        apiKey: "${AZURE_OPENAI_API_KEY}"
        instanceName: "${AZURE_OPENAI_INSTANCE_NAME}"       # ex: mon-openai-prod
        version: "2025-01-01-preview"                   # version API Azure
        assistants: true
        models:
          # gpt-35-turbo-16k:
          #   deploymentName: "gpt-35-turbo-16k"

          # gpt-4-turbo:
          #   deploymentName: "gpt-4-turbo"

          # gpt-4.1:
          #   deploymentName: "gpt-4.1"

          # gpt-4o:
          #   deploymentName: "gpt-4o"

          # gpt-5:
          #   deploymentName: "gpt-5"

          # gpt-5-mini:
          #   deploymentName: "gpt-5-mini"

          # gpt-5.1:
          #   deploymentName: "gpt-5.1"

          gpt-5.2:
            deploymentName: "gpt-5.2"

          gpt-5.4:
            deploymentName: "gpt-5.4"

          # o3-mini:
          #   deploymentName: "o3-mini"

          # o4-mini:
          #   deploymentName: "o4-mini"

          # text-embedding-3-large:
          #   deploymentName: "text-embedding-3-large"

          # text-embedding-ada-002:
          #   deploymentName: "text-embedding-ada-002"

  azureAssistants:
    disableBuilder: true
    pollIntervalMs: 3000
    timeoutMs: 180000
    capabilities: ["code_interpreter", "retrieval", "actions", "tools", "image_vision"]
  # agents:
  #   # (optional) Default recursion depth for agents, defaults to 25
  #   recursionLimit: 50
  #   # (optional) Max recursion depth for agents, defaults to 25
  #   maxRecursionLimit: 100
  #   # (optional) Disable the builder interface for agents
  #   disableBuilder: false
  #   # (optional) Maximum total citations to include in agent responses, defaults to 30
  #   maxCitations: 30
  #   # (optional) Maximum citations per file to include in agent responses, defaults to 7
  #   maxCitationsPerFile: 7
  #   # (optional) Minimum relevance score for sources to be included in responses, defaults to 0.45 (45% relevance threshold)
  #   # Set to 0.0 to show all sources (no filtering), or higher like 0.7 for stricter filtering
  #   minRelevanceScore: 0.45
  #   # (optional) Agent Capabilities available to all users. Omit the ones you wish to exclude. Defaults to list below.
